# --- General Configuration ---
spring.application.name=managementsystem
server.port=${PORT:8081}

# --- Database Configuration (Render/Cloud Ready) ---
# We use standard environment variable names used by most MySQL providers (like Aiven or TiDB)
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

# --- Connection Pool Settings (Professional Addition) ---
# This prevents your app from crashing if the database connection drops
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# --- JPA / Hibernate Settings ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Logging ---
# Useful for debugging production issues without cluttering logs
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=INFO
